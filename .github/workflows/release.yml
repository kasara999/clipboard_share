# GitHub Actionsのワークフロー設定ファイル
# 「v1.0.0」のようなタグをプッシュすると自動でWindowsビルド＆Releaseを作成する

name: Build and Release

on:
  push:
    tags:
      - 'v*' # 「v」で始まるタグ（v1.0.0など）がプッシュされたときだけ実行

jobs:
  build:
    runs-on: windows-latest # GitHub所有のWindows環境で実行
    permissions:
      contents: write # Releaseの作成・ファイルのアップロードに必要な権限

    steps:
      # リポジトリのコードをダウンロード
      - name: Checkout
        uses: actions/checkout@v4

      # Flutter SDKをセットアップ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 依存パッケージをインストール
      - name: Install dependencies
        run: flutter pub get

      # Windowsアプリをビルド
      - name: Build Windows
        run: flutter build windows --release

      # Inno Setupでインストーラーを作成
      - name: Build Installer
        run: |
          choco install innosetup --no-progress -y
          iscc /DAppVersion=${{ github.ref_name }} installer.iss

      # GitHubのReleaseページを作成してインストーラーをアップロード
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/ClipSync-Setup.exe
          name: ClipSync ${{ github.ref_name }} # タグ名がリリース名になる
          body: |
            ## ダウンロード
            `ClipSync-Setup.exe` をダウンロードして実行するだけでインストールできます。

            ## 必要なもの
            - Windows 10以降
            - iPhoneアプリと同じWi-Fiに接続していること
